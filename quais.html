<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<title>Détrompeurs Carrefour</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
input{-webkit-user-select:text;user-select:text}
body{background:#111;font-family:Arial,sans-serif;min-height:100dvh;padding:4vw;padding-bottom:16vw;animation:slideFromRight 0.4s ease}
@keyframes slideFromRight{from{transform:translateX(100vw)}to{transform:translateX(0)}}
body.go-left{animation:slideToRight 0.4s ease forwards}
@keyframes slideToRight{from{transform:translateX(0)}to{transform:translateX(100vw)}}
.header{display:flex;align-items:center;gap:3vw;margin-bottom:5vw;overflow:hidden;}
.header img{height:8vw;width:auto;flex-shrink:0;}
.title-wrap{flex:1;overflow:hidden;}
.title{display:block;color:#fff;font-size:5vw;font-weight:bold;letter-spacing:1px;text-transform:uppercase;opacity:.7;white-space:nowrap;text-align:right;transform:translateX(-100vw);}
.title.scrolled{animation:scrollOnce 1.2s cubic-bezier(0.25,0.46,0.45,0.94) forwards;}
@keyframes scrollOnce{0%{transform:translateX(-100vw);}100%{transform:translateX(0);}}
.panel{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:4vw;padding:4vw;margin-bottom:4vw}
.panel-title{font-size:4vw;font-weight:bold;color:#aaa;text-transform:uppercase;letter-spacing:1px;margin-bottom:4vw;text-align:center}
.quai-input{width:100%;background:#2e2e2e;border:1px solid #555;border-radius:3vw;color:#fff;padding:4vw;font-size:7vw;outline:none;margin-bottom:4vw;text-align:center}
.quai-input::placeholder{color:#555}
.result-box{background:#0d0d0d;border-radius:3vw;padding:4vw;min-height:18vw;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1px solid #222}
.rn{color:#555;font-size:4vw}
.rok{color:#4ade80;font-size:14vw;font-weight:bold}
.rko{color:#f87171;font-size:7vw;font-weight:bold}
.rsub{font-size:3.5vw;color:#888;margin-top:1vw}
.rlbl{font-size:3.5vw;color:#666;margin-bottom:1vw}
.nav-dot{position:fixed;bottom:calc(4vw + env(safe-area-inset-bottom));left:0;right:0;display:flex;justify-content:center;gap:3vw;z-index:200}
.dot{width:2.5vw;height:2.5vw;border-radius:50%;background:#444;cursor:pointer}
.dot.active{background:#fff}
.signature{text-align:right;font-size:3vw;color:#444;font-style:italic;margin-top:2vw;padding-right:1vw}
</style>
</head>
<body>

<div class="header">
  <div class="title-wrap"><span class="title" id="mainTitle">Codes détrompeurs</span></div>
  <img src="Carrefour NB.png" alt="Carrefour" id="headerLogo" />
</div>

<div class="panel">
  <div class="panel-title">Quais &amp; Travées</div>
  <input class="quai-input" type="text" inputmode="numeric" id="inputQuai" placeholder="N° quai ou travée..." oninput="searchQuai()" onclick="resetQuai()"/>
  <div class="result-box" id="resultQuai"><span class="rn">Code Détrompeur</span></div>
</div>

<div class="signature">Développé par Bernard V <span id="app-version"></span></div>

<div class="nav-dot">
  <div class="dot" onclick="goToPicking()"></div>
  <div class="dot active"></div>
</div>

let touchStartX=0;

function goToPicking(){
  document.body.classList.add('go-left');
  setTimeout(()=>window.location.href='index.html',400);
}

document.addEventListener('touchstart',e=>{touchStartX=e.changedTouches[0].screenX;});
document.addEventListener('touchend',e=>{
  const diff=touchStartX-e.changedTouches[0].screenX;
  if(diff<-80) goToPicking();
});

function searchQuai(){
  const val=document.getElementById("inputQuai").value.trim();
  const box=document.getElementById("resultQuai");
  if(val.length<2){box.innerHTML='<span class="rn">Code Détrompeur</span>';return;}
  const found=quaiData[val];
  if(found){box.innerHTML='<span class="rlbl">Quai / Travée '+val+'</span><span class="rok">'+found+'</span>';}
  else{box.innerHTML='<span class="rko">Introuvable</span><span class="rsub">"'+val+'" non reconnu</span>';}
  if(val.length>=3) document.getElementById("inputQuai").blur();
}

function resetQuai(){
  document.getElementById("inputQuai").value="";
  document.getElementById("resultQuai").innerHTML='<span class="rn">Code Détrompeur</span>';
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('service-worker.js')
    .then(()=>console.log('SW ok'))
    .catch(e=>console.log('SW err',e));
}

async function displayVersion() {
  try {
    const response = await fetch('./service-worker.js');
    const text = await response.text();
    const match = text.match(/CACHE_NAME\s*=\s*['"]detrompeurs-(V[\d.]+)['"]/);
    if (match && match[1]) {
      document.getElementById('app-version').textContent = `- ${match[1]}`;
    }
  } catch (e) { console.log("Erreur version", e); }
}

displayVersion();
setTimeout(()=>document.getElementById("inputQuai").focus(),500);
setTimeout(() => {
  document.getElementById('mainTitle').classList.add('scrolled');
}, 100);
</script>

</html>
